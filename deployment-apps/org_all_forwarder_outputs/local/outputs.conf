# =============================================================================
# org_all_forwarder_outputs — Base Output Configuration
# =============================================================================
# Deployed to: All Universal Forwarders via server class "All_Forwarders"
# Purpose: Ensure all forwarders send data to the correct indexer tier
# =============================================================================

[tcpout]
defaultGroup = primary_indexers
forwardedindex.filter.disable = true
indexAndForward = false

[tcpout:primary_indexers]
server = idx1.company.com:9997, idx2.company.com:9997, idx3.company.com:9997
autoLBFrequency = 60
autoLBVolume = 1048576
useACK = true
compressed = true
