# =============================================================================
# outputs.conf — Forwarder Output Configuration (Deployment App)
# =============================================================================
# Purpose: Direct forwarder data to indexer cluster via indexer discovery
#          or explicit indexer list.
#
# Deployed via: org_all_forwarder_outputs app
# =============================================================================

# --- Option A: Indexer Discovery (Recommended for Clustered Environments) ---
[indexer_discovery:clustered_indexers]
pass4SymmKey = <encrypted_key>
master_uri = https://cluster-manager.company.com:8089

[tcpout]
defaultGroup = indexer_discovery_group
forwardedindex.filter.disable = true
indexAndForward = false

[tcpout:indexer_discovery_group]
indexerDiscovery = clustered_indexers
autoLBFrequency = 60
useACK = true

# --- Option B: Explicit Indexer List (Non-Clustered Environments) ---
# [tcpout]
# defaultGroup = primary_indexers
# forwardedindex.filter.disable = true
# indexAndForward = false
#
# [tcpout:primary_indexers]
# server = idx1.company.com:9997, idx2.company.com:9997, idx3.company.com:9997
# autoLBFrequency = 60
# useACK = true
#
# [tcpout:primary_indexers:ssl]
# sslCertPath = $SPLUNK_HOME/etc/auth/server.pem
# sslRootCAPath = $SPLUNK_HOME/etc/auth/ca.pem
# sslPassword = <encrypted>
# sslVerifyServerCert = true
