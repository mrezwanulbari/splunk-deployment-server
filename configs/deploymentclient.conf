# =============================================================================
# deploymentclient.conf — Universal Forwarder Deployment Client Configuration
# =============================================================================
# Purpose: Configure forwarders to connect to the Deployment Server
#          for centralized configuration management.
#
# Location: $SPLUNK_HOME/etc/system/local/deploymentclient.conf
# Deploy:   Push via initial installation or manual bootstrap.
# =============================================================================

[deployment-client]
# Phone home interval (seconds). Default: 30
# For large environments (5000+ UFs), increase to 300-600
phoneHomeIntervalInSecs = 300

# Client name (defaults to hostname if not specified)
# clientName = <hostname>

[target-broker:deploymentServer]
# Primary Deployment Server
targetUri = ds.company.com:8089

# For multi-site deployments with DNS round-robin:
# targetUri = ds-east.company.com:8089
# targetUri = ds-west.company.com:8089
