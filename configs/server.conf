# =============================================================================
# server.conf — Deployment Server Configuration
# =============================================================================
# Purpose: Configure the Splunk Deployment Server instance settings
#
# Location: $SPLUNK_HOME/etc/system/local/server.conf
# =============================================================================

[general]
serverName = deployment-server
pass4SymmKey = <encrypted_key>

[sslConfig]
sslVersions = tls1.2
sslVersionsForClient = tls1.2
cipherSuite = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

[deployment]
# Maximum number of clients
maxClients = 50000

# Timeout for streaming app content to clients (seconds)
streamInWriteTimeout = 10

[diskUsage]
minFreeSpace = 5000
