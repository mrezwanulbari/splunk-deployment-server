# =============================================================================
# serverclass.conf — Splunk Deployment Server Class Definitions
# =============================================================================
# Purpose: Define server classes to group Universal Forwarders and map
#          deployment apps to appropriate client groups.
#
# Location: $SPLUNK_HOME/etc/system/local/serverclass.conf
# Reference: https://docs.splunk.com/Documentation/Splunk/latest/Admin/Serverclassconf
# =============================================================================

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
[global]
repositoryLocation = $SPLUNK_HOME/etc/deployment-apps
# Cross-server class restarts
crossServerChecksum = true

# =============================================================================
# SERVER CLASS: All Forwarders (Base Configuration)
# =============================================================================
[serverClass:All_Forwarders]
whitelist.0 = *
restartSplunkd = true

[serverClass:All_Forwarders:app:org_all_forwarder_outputs]
restartSplunkd = true

[serverClass:All_Forwarders:app:org_full_license_server]
restartSplunkd = true

[serverClass:All_Forwarders:app:org_all_deploymentclient]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Windows Servers
# =============================================================================
[serverClass:Windows_Servers]
machineTypesFilter = windows-x64
whitelist.0 = *

[serverClass:Windows_Servers:app:org_windows_inputs]
restartSplunkd = true

[serverClass:Windows_Servers:app:Splunk_TA_windows]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Linux Servers
# =============================================================================
[serverClass:Linux_Servers]
machineTypesFilter = linux-x86_64
whitelist.0 = *

[serverClass:Linux_Servers:app:org_linux_inputs]
restartSplunkd = true

[serverClass:Linux_Servers:app:Splunk_TA_nix]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Domain Controllers
# =============================================================================
[serverClass:Domain_Controllers]
machineTypesFilter = windows-x64
whitelist.0 = dc-*
whitelist.1 = ad-*

[serverClass:Domain_Controllers:app:org_ad_inputs]
restartSplunkd = true

[serverClass:Domain_Controllers:app:SA-ldapsearch]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Web Servers
# =============================================================================
[serverClass:Web_Servers]
whitelist.0 = web-*
whitelist.1 = www-*
whitelist.2 = apache-*
whitelist.3 = nginx-*

[serverClass:Web_Servers:app:org_webserver_inputs]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Database Servers
# =============================================================================
[serverClass:Database_Servers]
whitelist.0 = db-*
whitelist.1 = sql-*
whitelist.2 = mysql-*
whitelist.3 = postgres-*

[serverClass:Database_Servers:app:org_database_inputs]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Network Devices (Syslog via SC4S)
# =============================================================================
[serverClass:Network_Syslog]
whitelist.0 = syslog-*
whitelist.1 = sc4s-*

[serverClass:Network_Syslog:app:org_syslog_inputs]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Security Infrastructure
# =============================================================================
[serverClass:Security_Devices]
whitelist.0 = fw-*
whitelist.1 = ids-*
whitelist.2 = proxy-*
whitelist.3 = edr-*

[serverClass:Security_Devices:app:org_security_inputs]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Production Environment
# =============================================================================
[serverClass:Production]
whitelist.0 = prod-*
blacklist.0 = prod-test-*

[serverClass:Production:app:org_production_monitoring]
restartSplunkd = true

# =============================================================================
# SERVER CLASS: Heavy Forwarders (Intermediate Forwarding Tier)
# =============================================================================
[serverClass:Heavy_Forwarders]
whitelist.0 = hf-*
whitelist.1 = hwf-*
machineTypesFilter = linux-x86_64

[serverClass:Heavy_Forwarders:app:org_hf_outputs]
restartSplunkd = true

[serverClass:Heavy_Forwarders:app:org_hf_inputs]
restartSplunkd = true

[serverClass:Heavy_Forwarders:app:org_hf_props_transforms]
restartSplunkd = true
